version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# Monster Quote System – Production Docker Compose
# 使用方式：複製 .env.example 為 .env 並填入正確值，再執行 docker compose up -d
# ──────────────────────────────────────────────────────────────────────────────

networks:
  monster-net:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: monster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    networks:
      - monster-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (one-shot) ───────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monster-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    command: >
      sh -c "npx prisma migrate deploy --schema=/app/prisma/schema.prisma"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monster-net

  # ── NestJS API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monster-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - monster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: monster-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      - api
    networks:
      - monster-net
