version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# Monster Quote System – Production Docker Compose
# 使用方式：複製 .env.example 為 .env 並填入正確值，再執行 docker compose up -d
# ──────────────────────────────────────────────────────────────────────────────

networks:
  monster-net:
    driver: bridge

volumes:
  postgres-data:
  certbot-webroot:    # Let's Encrypt ACME challenge webroot
  certbot-certs:      # Let's Encrypt 憑證存放
  backup-data:        # PostgreSQL 備份檔案

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: monster-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    networks:
      - monster-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB Migration (one-shot) ───────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monster-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    command: >
      sh -c "echo '=== DATABASE_URL CHECK ===' && echo $$DATABASE_URL && echo '=========================' && npx prisma migrate deploy"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monster-net

  # ── NestJS API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monster-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - monster-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: monster-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      - api
    networks:
      - monster-net

  # ── Agent C：Nginx Reverse Proxy ──────────────────────────────────────────────
  # HTTP 模式：直接 reverse proxy（預設）
  # HTTPS 模式：執行 bash scripts/init-letsencrypt.sh 後自動切換
  nginx:
    image: nginx:1.27-alpine
    container_name: monster-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro          # HTTP-only 設定
      - ./nginx/templates:/etc/nginx/templates:ro    # HTTPS template（SSL 啟用後生效）
      - certbot-webroot:/var/www/certbot:ro           # ACME challenge
      - certbot-certs:/etc/letsencrypt:ro             # SSL 憑證
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - api
      - web
    networks:
      - monster-net

  # ── Agent C：Certbot（Let's Encrypt 憑證管理）─────────────────────────────────
  # 初次申請：bash scripts/init-letsencrypt.sh
  # 自動續期：每 12 小時嘗試 renew
  certbot:
    image: certbot/certbot:latest
    container_name: monster-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # 每 12 小時嘗試自動續期
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    networks:
      - monster-net

  # ── Agent D：PostgreSQL 自動備份 ──────────────────────────────────────────────
  # 預設：每天凌晨 2:00 備份，保留 7 天
  # 備份位置：backup-data volume（/backups/）
  # 手動觸發：docker compose exec db-backup /scripts/db-backup.sh
  db-backup:
    image: postgres:16-alpine
    container_name: monster-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: db
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./scripts/db-backup.sh:/scripts/db-backup.sh:ro
      - ./scripts/backup-crontab:/etc/crontabs/root:ro
      - backup-data:/backups
    entrypoint: >
      sh -c "chmod +x /scripts/db-backup.sh &&
             echo '✅ DB Backup 排程已啟動（每天 02:00）' &&
             crond -f -l 2"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monster-net
